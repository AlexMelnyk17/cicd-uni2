name: Django CI & Heroku Deployment Preparation

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests via Pytest
        env:
          SECRET_KEY: "ci-temporary-secret-key-for-github-actions"
          DEBUG: "False"
        run: |
          pytest

  heroku-config-check:
    name: Verify Heroku Deployment Readiness
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Procfile presence
        run: |
          if [ ! -f Procfile ]; then
            echo "ERROR: Procfile missing! Heroku needs it to run the app."
            exit 1
          else
            echo "SUCCESS: Procfile found."
            cat Procfile
          fi
